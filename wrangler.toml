name = "qms-system"
type = "javascript"
main = "dist/index.js"
compatibility_date = "2024-12-18"
compatibility_flags = ["nodejs_compat"]

[build]
command = "npm run build"
cwd = "./"
watch_paths = ["app/**/*.ts", "app/**/*.tsx", "components/**/*.ts", "components/**/*.tsx", "lib/**/*.ts", "hooks/**/*.ts", "services/**/*.ts", "messages/**/*.json"]

[env.production]
name = "qms-system-prod"
route = "qms.ndcindustrial.co.th/*"
zone_id = "de752804655adc66a46e3d90c081fbd8"

[env.staging]
name = "qms-system-staging"
route = "staging-qms.ndcindustrial.co.th/*"
zone_id = "de752804655adc66a46e3d90c081fbd8"

[[env.production.analytics_engine_datasets]]
dataset = "qms_analytics"

[[env.staging.analytics_engine_datasets]]
dataset = "qms_analytics_staging"
